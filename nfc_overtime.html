<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard NFC – ovrtm.overtime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #fff;
      min-height: 100vh; padding: 2rem 1.5rem;
    }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.25rem; }
    .sub { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }

    /* Login */
    #login-screen {
      max-width: 340px; margin: 4rem auto; text-align: center;
    }
    #login-screen input {
      width: 100%; padding: 0.75rem 1rem;
      background: #111; border: 1px solid #333; border-radius: 10px;
      color: #fff; font-size: 1rem; margin: 1.5rem 0 0.75rem;
    }
    #login-screen button {
      width: 100%; padding: 0.75rem;
      background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
      border: none; border-radius: 10px;
      color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    #login-error { color: #e24b4b; font-size: 0.8rem; margin-top: 0.5rem; }

    /* Dashboard */
    #dashboard { display: none; max-width: 600px; margin: 0 auto; }
    .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 2rem; }
    .card {
      background: #111; border: 1px solid #222;
      border-radius: 14px; padding: 1.2rem;
    }
    .card .label { font-size: 0.75rem; color: #666; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 2rem; font-weight: 700; }
    .card.total .value { color: #fff; }
    .card.ios .value { color: #63b3f5; }
    .card.android .value { color: #7fcf75; }
    .card.other .value { color: #aaa; }

    .section-title { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; color: #555; font-weight: 500; padding: 0.4rem 0.5rem; border-bottom: 1px solid #1a1a1a; }
    td { padding: 0.5rem 0.5rem; border-bottom: 1px solid #111; color: #ccc; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 600;
    }
    .badge.ios    { background: #0c447c22; color: #63b3f5; }
    .badge.android{ background: #27500a22; color: #7fcf75; }
    .badge.other  { background: #2c2c2a33; color: #888; }

    .refresh-btn {
      background: none; border: 1px solid #333; color: #888;
      padding: 0.4rem 1rem; border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; margin-bottom: 1.5rem;
    }
    .refresh-btn:hover { border-color: #555; color: #ccc; }

    .logout { font-size: 0.75rem; color: #444; cursor: pointer; margin-top: 2rem; }
    .logout:hover { color: #888; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>Dashboard NFC</h1>
  <p style="color:#555; font-size:0.85rem; margin-top:0.5rem;">@ovrtm.overtime</p>
  <input type="password" id="pwd-input" placeholder="Password di accesso" />
  <button onclick="tryLogin()">Accedi</button>
  <div id="login-error"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h1>Dashboard NFC</h1>
  <p class="sub">@ovrtm.overtime · aggiornamento in tempo reale</p>

  <button class="refresh-btn" onclick="loadData()">↻ Aggiorna</button>

  <div class="cards">
    <div class="card total"><div class="label">Totale scansioni</div><div class="value" id="c-total">–</div></div>
    <div class="card ios"><div class="label">iPhone / iOS</div><div class="value" id="c-ios">–</div></div>
    <div class="card android"><div class="label">Android</div><div class="value" id="c-android">–</div></div>
    <div class="card other"><div class="label">Altro</div><div class="value" id="c-other">–</div></div>
  </div>

  <div class="section-title">Ultime 50 scansioni</div>
  <table>
    <thead><tr><th>Data e ora</th><th>Dispositivo</th></tr></thead>
    <tbody id="scan-list"><tr><td colspan="2" style="color:#444">Caricamento…</td></tr></tbody>
  </table>

  <div class="logout" onclick="logout()">Esci</div>
</div>

<script>
  // ══════════════════════════════════════════
  //  INSERISCI QUI LE TUE CREDENZIALI SUPABASE
  // ══════════════════════════════════════════
  const SUPABASE_URL = 'https://ydwjejxcjfuuyxlrykvr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_xoBI9oqM5qJ2GJ8OmFG74w_nkcv-stD';

  const DASHBOARD_PASSWORD = 'Penelope-01';

  function tryLogin() {
    const val = document.getElementById('pwd-input').value;
    if (val === DASHBOARD_PASSWORD) {
      sessionStorage.setItem('nfc_auth', '1');
      showDashboard();
    } else {
      document.getElementById('login-error').textContent = 'Password errata';
    }
  }

  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  }

  function logout() {
    sessionStorage.removeItem('nfc_auth');
    location.reload();
  }

  async function loadData() {
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

    // Conta per device
    const counts = { ios: 0, android: 0, other: 0 };
    const allRes = await fetch(`${SUPABASE_URL}/rest/v1/nfc_scans?select=device`, { headers });
    const all = await allRes.json();
    all.forEach(r => { if (counts[r.device] !== undefined) counts[r.device]++; });

    document.getElementById('c-total').textContent   = all.length;
    document.getElementById('c-ios').textContent     = counts.ios;
    document.getElementById('c-android').textContent = counts.android;
    document.getElementById('c-other').textContent   = counts.other;

    // Ultimi 50
    const recentRes = await fetch(
      `${SUPABASE_URL}/rest/v1/nfc_scans?select=device,scanned_at&order=scanned_at.desc&limit=50`,
      { headers }
    );
    const recent = await recentRes.json();
    const tbody = document.getElementById('scan-list');
    tbody.innerHTML = recent.map(r => {
      const d = new Date(r.scanned_at);
      const dateStr = d.toLocaleDateString('it-IT') + ' ' + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      return `<tr><td>${dateStr}</td><td><span class="badge ${r.device}">${r.device}</span></td></tr>`;
    }).join('');
  }

  // Controlla se già loggato
  if (sessionStorage.getItem('nfc_auth') === '1') showDashboard();
</script>
</body>
</html>
