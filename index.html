<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apri Instagram</title>
  <style>
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; background:#0b0b0f; color:#fff; }
    body{ display:flex; align-items:center; justify-content:center; }
    .modal{
      width:90%; max-width:360px; background:#1c1c1e; border-radius:26px;
      padding:30px 20px 24px; text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      animation:fadeUp 0.35s ease forwards; transform:translateY(20px); opacity:0;
    }
    .logo-ring{
      width:100px; height:100px; margin:0 auto 20px; padding:3px;
      border-radius:50%;
      background:linear-gradient(135deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
    }
    .logo-inner{ width:100%; height:100%; border-radius:50%; overflow:hidden; background:#000; }
    .logo-inner img{ width:100%; height:100%; object-fit:cover; }
    .title{ font-size:21px; font-weight:bold; margin-bottom:10px; }
    .subtitle{ font-size:14px; color:#bbb; margin-bottom:22px; line-height:1.4; }
    .btn{
      width:100%; padding:16px; border:none; border-radius:14px;
      background:#4a5cff; color:#fff; font-size:17px; font-weight:bold;
      cursor:pointer; transition:all 0.12s ease;
    }
    .btn:active{ transform:scale(0.96); }
    .secondary{ margin-top:14px; font-size:14px; color:#aaa; cursor:pointer; }
    @keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="modal">
    <div class="logo-ring">
      <div class="logo-inner">
        <img src="logo.png" alt="OVRTM">
      </div>
    </div>
    <div class="title">Vedi il profilo completo nell'app</div>
    <div class="subtitle">Usa l'app per vedere altro su<br><b>ovrtm.overtime</b></div>
    <button class="btn" id="openBtn">Apri Instagram</button>
    <div class="secondary" id="followBtn">Iscriviti</div>
  </div>

<script>
  const SUPABASE_URL = 'https://ydwjejxcjfuuyxlrykvr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_xoBI9oqM5qJ2GJ8OmFG74w_nkcv-stD';
  const IG_USER      = 'ovrtm.overtime';
  const IG_URL       = 'https://www.instagram.com/' + IG_USER + '/';
  const ANDROID_INTENT = 'intent://www.instagram.com/' + IG_USER + '/#Intent;package=com.instagram.android;scheme=https;S.browser_fallback_url=https%3A%2F%2Fwww.instagram.com%2F' + IG_USER + '%2F;end';

  // ── Parametri URL ──────────────────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const tag      = params.get('tag')      || '000';
  const campaign = params.get('campaign') || '';
  const src      = params.get('src')      || 'nfc';

  // ── User ID anonimo persistente ────────────────────────────
  function getUID() {
    let uid = localStorage.getItem('nfc_uid');
    if (!uid) { uid = 'u_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); localStorage.setItem('nfc_uid', uid); }
    return uid;
  }
  const userId = getUID();

  // ── Rilevamento dispositivo/browser ───────────────────────
  const ua       = navigator.userAgent || '';
  const isIOS    = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid= /Android/i.test(ua);
  const isMobile = isIOS || isAndroid;
  const platform = isAndroid ? 'android' : isIOS ? 'ios' : 'other';
  const isSafari = /Safari/i.test(ua) && !/CriOS|FxiOS|OPiOS|EdgiOS|Chrome/i.test(ua);
  const isChrome = /CriOS|Chrome/i.test(ua) && !/Edg|OPR/i.test(ua);
  const browser  = isSafari ? 'safari' : isChrome ? 'chrome' : 'other';

  function getModel() {
    if (isIOS) return 'iPhone';
    const m = ua.match(/Android[^;]*;\s*([^)]+)\)/);
    return m ? m[1].trim() : 'Android';
  }

  const pageOpenTime = Date.now();

  // ── Payload base ───────────────────────────────────────────
  function basePayload(event, extra) {
    return Object.assign({
      event,
      tag,
      campaign,
      src,
      user_id:          userId,
      timestamp_client: new Date().toISOString(),
      ua,
      platform,
      model:            getModel(),
      browser,
      mobile:           isMobile,
      language:         navigator.language || '',
      timezone:         Intl.DateTimeFormat().resolvedOptions().timeZone || '',
      screen:           screen.width + 'x' + screen.height,
      referrer:         document.referrer || '',
      page_url:         location.href,
      page_path:        location.pathname + location.search,
    }, extra || {});
  }

  // ── Invio a Supabase ───────────────────────────────────────
  function track(payload) {
    const body = JSON.stringify(payload);
    if (navigator.sendBeacon) {
      const blob = new Blob([body], { type: 'application/json' });
      // sendBeacon non supporta headers custom → uso fetch con keepalive
    }
    fetch(SUPABASE_URL + '/rest/v1/nfc_scans', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer':        'return=minimal'
      },
      body,
      keepalive: true
    }).catch(function(){});
  }

  // ── 1. page_open ──────────────────────────────────────────
  track(basePayload('page_open', { seconds_on_page: 0, destination: IG_URL }));

  // ── 2. visibility_change ──────────────────────────────────
  document.addEventListener('visibilitychange', function() {
    track(basePayload('visibility_change', {
      seconds_on_page: Math.round((Date.now() - pageOpenTime) / 1000),
      destination: document.hidden ? 'background' : 'foreground'
    }));
  });

  // ── 3. page_hide ─────────────────────────────────────────
  window.addEventListener('pagehide', function() {
    track(basePayload('page_hide', {
      seconds_on_page: Math.round((Date.now() - pageOpenTime) / 1000),
      destination: IG_URL
    }));
  });

  // ── 4. click_instagram ────────────────────────────────────
  function openInstagram() {
    track(basePayload('click_instagram', {
      seconds_on_page: Math.round((Date.now() - pageOpenTime) / 1000),
      destination: IG_URL
    }));
    setTimeout(function() {
      if (isAndroid) {
        window.location.href = ANDROID_INTENT;
        setTimeout(function() { window.location.href = IG_URL; }, 900);
      } else {
        window.location.href = IG_URL;
      }
    }, 120);
  }

  document.getElementById('openBtn').addEventListener('click', openInstagram);
  document.getElementById('followBtn').addEventListener('click', openInstagram);

  // ── Auto-redirect solo su Safari nativo iOS ───────────────
  if (isIOS && isSafari) {
    setTimeout(function() {
      track(basePayload('click_instagram', {
        seconds_on_page: 0,
        destination: IG_URL
      }));
      window.location.href = IG_URL;
    }, 1500);
  }
</script>
</body>
</html>
