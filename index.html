<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ovrtm.overtime – Instagram</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .sheet {
      background: #1c1c1e; border-radius: 20px;
      padding: 2rem 1.5rem 1.75rem; max-width: 340px; width: 90%; text-align: center;
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%; background: #7c3aed;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.1rem; font-size: 0.75rem; font-weight: 800;
      color: #fff; letter-spacing: 0.05em;
    }
    h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.3rem; }
    .desc { font-size: 0.85rem; color: #aaa; margin-bottom: 1.5rem; line-height: 1.5; }
    .desc strong { color: #fff; }
    .btn-open {
      display: block; width: 100%; background: #0095f6;
      color: #fff; font-size: 0.95rem; font-weight: 700;
      padding: 0.75rem; border-radius: 10px; border: none; cursor: pointer;
      text-decoration: none; margin-bottom: 0.75rem;
    }
    .btn-open:active { opacity: 0.85; }
    .btn-follow {
      display: block; width: 100%; background: transparent;
      color: #0095f6; font-size: 0.9rem; font-weight: 600;
      padding: 0.5rem; border: none; cursor: pointer; text-decoration: none;
    }
    #status { font-size: 0.7rem; color: #333; margin-top: 1.25rem; }
  </style>
</head>
<body>
<div class="sheet">
  <div class="avatar"><span>OVRTM</span></div>
  <h2>Vedi il profilo completo<br>nell'app</h2>
  <p class="desc">Usa l'app per vedere altro su<br><strong>ovrtm.overtime</strong></p>
  <a class="btn-open" id="ig-btn" href="#">Apri Instagram</a>
  <a class="btn-follow" id="ig-follow" href="#">Iscriviti</a>
  <div id="status"></div>
</div>
<script>
  const SUPABASE_URL = 'https://ydwjejxcjfuuyxlrykvr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_xoBI9oqM5qJ2GJ8OmFG74w_nkcv-stD';
  const IG_USER = 'ovrtm.overtime';
  const IG_URL  = 'https://www.instagram.com/' + IG_USER + '/';

  function getDevice() {
    const ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
    if (/Android/i.test(ua)) return 'android';
    return 'other';
  }

  function getLink(device) {
    if (device === 'android') {
      return 'intent://www.instagram.com/' + IG_USER + '/#Intent;package=com.instagram.android;scheme=https;S.browser_fallback_url=https%3A%2F%2Fwww.instagram.com%2F' + IG_USER + '%2F;end';
    }
    return IG_URL;
  }

  async function registerScan(device) {
    try {
      await fetch(SUPABASE_URL + '/rest/v1/nfc_scans', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ device })
      });
    } catch {}
  }

  function init() {
    const device = getDevice();
    const link   = getLink(device);
    const isSafari = /Safari/i.test(navigator.userAgent) && !/Chrome/i.test(navigator.userAgent);

    document.getElementById('ig-btn').href    = link;
    document.getElementById('ig-follow').href = link;

    registerScan(device);

    // Auto-redirect solo su Safari (non su Chrome iOS che mostra il popup fastidioso)
    if (isSafari || device === 'android') {
      setTimeout(() => { window.location.href = link; }, 1500);
    }
  }

  init();
</script>
</body>
</html>
