  <h1>@ovrtm.overtime</h1>
  <p>Apertura Instagram in corso…</p>
  <a class="btn" id="ig-link" href="#">Apri Instagram</a>
  <div id="status">registrazione scansione…</div>

  <script>
    // ══════════════════════════════════════════
    //  INSERISCI QUI LE TUE CREDENZIALI SUPABASE
    // ══════════════════════════════════════════
    const SUPABASE_URL = 'https://ydwjejxcjfuuyxlrykvr.supabase.co';   // ← sostituisci
    const SUPABASE_KEY = 'sb_publishable_xoBI9oqM5qJ2GJ8OmFG74w_nkcv-stD';  // ← sostituisci (anon public)
    // ══════════════════════════════════════════

    function getDevice() {
      const ua = navigator.userAgent;
      if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
      if (/Android/i.test(ua)) return 'android';
      return 'other';
    }

    function getLink(device) {
      if (device === 'android')
        return 'intent://instagram.com/ovrtm.overtime#Intent;package=com.instagram.android;scheme=https;end';
      return 'https://www.instagram.com/ovrtm.overtime/';
    }

    async function registerScan(device) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/nfc_scans`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ device })
        });
        document.getElementById('status').textContent = res.ok ? 'scansione registrata' : 'errore registrazione';
      } catch {
        document.getElementById('status').textContent = 'offline – non registrato';
      }
    }

    async function init() {
      const device = getDevice();
      const link = getLink(device);
      document.getElementById('ig-link').href = link;
      await registerScan(device);
      setTimeout(() => { window.location.href = link; }, 1200);
    }

    init();
  </script>
